<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>เรียนคำศัพท์ภาษาจีน 🇨🇳 สำหรับหนูน้อย</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Noto+Sans+SC:wght@500;700;900&family=Noto+Sans+Thai:wght@500;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">

    <!-- ===== หน้าแรก: เลือกหมวดหมู่ ===== -->
    <section id="screen-home" class="screen active">
      <header class="home-header">
        <h1 class="title">🐼 เรียนคำศัพท์ภาษาจีน</h1>
        <p class="subtitle">เลือกหมวดที่อยากเล่นกันเลย!</p>
      </header>
      <div id="category-grid" class="category-grid"></div>
      <footer class="credit">เตรียมสอบ N1 · 12 คำศัพท์ · รูปจากบทเรียน</footer>
    </section>

    <!-- ===== หน้าเมนูหมวด: เลือกโหมด ===== -->
    <section id="screen-menu" class="screen">
      <button class="back-btn" data-go="home">⬅️</button>
      <div class="menu-wrap">
        <div id="menu-badge" class="menu-badge"></div>
        <h2 id="menu-title" class="menu-title"></h2>
        <p id="menu-count" class="menu-count"></p>
        <div class="mode-list">
          <button class="mode-btn mode-review" data-mode="review">
            <span class="mode-emoji">📖</span>
            <span class="mode-text"><b>ทบทวนคำศัพท์</b><small>ดูรูป ฟังเสียง อ่านคำ</small></span>
          </button>
          <button class="mode-btn mode-tap" data-mode="confirm">
            <span class="mode-emoji">🖐️</span>
            <span class="mode-text"><b>แตะรูป ฟังเสียง แล้วตอบ</b><small>เหมาะกับเด็กที่ยังอ่านไม่ออก · ไม่มีตัวอักษร</small></span>
          </button>
          <button class="mode-btn mode-listen" data-mode="listen">
            <span class="mode-emoji">🔊</span>
            <span class="mode-text"><b>ฟังเสียง เลือกรูป</b><small>เกมฝึกฟัง</small></span>
          </button>
          <button class="mode-btn mode-look" data-mode="look">
            <span class="mode-emoji">🖼️</span>
            <span class="mode-text"><b>ดูรูป เลือกคำ</b><small>เกมฝึกอ่าน (มีตัวอักษร)</small></span>
          </button>
        </div>
      </div>
    </section>

    <!-- ===== หน้าทบทวน (แฟลชการ์ด) ===== -->
    <section id="screen-review" class="screen">
      <button class="back-btn" data-go="menu">⬅️</button>
      <div class="review-stage">
        <div id="flashcard" class="flashcard">
          <div class="fc-pic"><img id="fc-img" alt="" /></div>
          <div class="fc-hanzi" id="fc-hanzi"></div>
          <div class="fc-pinyin" id="fc-pinyin"></div>
          <div class="fc-th" id="fc-th"></div>
          <button id="fc-speak" class="speak-btn">🔊 ฟังเสียง</button>
        </div>
      </div>
      <div class="review-nav">
        <button id="rv-prev" class="nav-round">◀</button>
        <div id="rv-dots" class="dots"></div>
        <button id="rv-next" class="nav-round">▶</button>
      </div>
      <button id="rv-play" class="big-cta">พร้อมแล้ว เล่นเกม! 🎮</button>
    </section>

    <!-- ===== หน้าเกม ===== -->
    <section id="screen-game" class="screen">
      <button class="back-btn" data-go="menu">⬅️</button>
      <div class="game-top">
        <div id="game-stars" class="game-stars"></div>
        <div id="game-progress" class="game-progress"></div>
      </div>
      <div id="game-prompt" class="game-prompt"></div>
      <div id="game-choices" class="game-choices"></div>
      <div id="game-action" class="game-action"></div>
      <div id="game-feedback" class="game-feedback"></div>
    </section>

    <!-- ===== หน้าจบเกม ===== -->
    <section id="screen-done" class="screen">
      <div class="done-wrap">
        <div class="done-emoji">🏆</div>
        <h2 class="done-title">เก่งมาก!</h2>
        <p id="done-score" class="done-score"></p>
        <div id="done-stars" class="done-stars"></div>
        <button id="done-again" class="big-cta">เล่นอีกครั้ง 🔁</button>
        <button class="ghost-cta" data-go="home">กลับหน้าแรก 🏠</button>
      </div>
    </section>

  </div>

  <canvas id="confetti"></canvas>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
